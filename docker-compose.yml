# ローカル開発用 PostgreSQL
# 使い方:
#   docker compose up -d      … DB起動（初回は db/*.sql を自動実行＝schema→seed）
#   docker compose down       … 停止（データは保持）
#   docker compose down -v    … 停止＋データ全削除（作り直し）
#
# 接続情報: host=localhost port=5432 db=pl_app user=pl password=pl_password
services:
  db:
    image: postgres:16
    container_name: pl_app_db
    environment:
      POSTGRES_DB: pl_app
      POSTGRES_USER: pl
      POSTGRES_PASSWORD: pl_password
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 初回起動時、このディレクトリ内の *.sql をファイル名順に自動実行
      # （schema.sql → seed.sql の順。README.md は無視される）
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pl -d pl_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
